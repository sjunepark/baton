language: "en-US"
reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  review_details: true
  path_filters:
    - "!go.sum"
  auto_review:
    enabled: true
    base_branches: []
    drafts: true
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
  path_instructions:
    - path: "cmd/**/*.go"
      instructions: |
        Keep the entrypoint thin and route command behavior through the Task
        service-backed CLI. Preserve JSON-first output and flag any duplicate
        Task model, direct GitHub behavior, or repository orchestration.
    - path: "internal/**/*.go"
      instructions: |
        Review the issue-only Task contract. Require explicit errors, typed
        bounded GitHub access, deterministic classification/selection, and
        prefix-safe dry-run/apply parity that preserves bodies and project
        labels. Flag config, repository-file mutation, orchestration, or
        compatibility behavior.
    - path: "skills/**"
      instructions: |
        Keep the skill limited to Task inspection, explicit enrollment and
        classification, advisory activity, and explicit close. Project
        implementation follows target-project instructions; flag any Baton
        checkout, branch, PR, CI, review, merge, release, scheduler, or
        delivery workflow.
    - path: "testdata/migration/**"
      instructions: |
        Treat fixtures as inert exact-release evidence. They must never
        authorize deletion, issue enrollment, or runtime compatibility.
chat:
  auto_reply: true
