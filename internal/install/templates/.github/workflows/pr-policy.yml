# Managed by Baton. Edit in this repository when your policy changes.
name: PR Policy

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: baton-delivery-${{ github.repository_id }}
  queue: max

jobs:
  check-pr-policy:
    name: Check PR policy
    if: __BATON_PR_OWNERSHIP_PREFILTER__
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Baton
        run: |
          __BATON_INSTALL_COMMAND__

      - name: Check PR policy
        run: baton pr-policy --event "$GITHUB_EVENT_PATH"
        env:
          GITHUB_TOKEN: ${{ github.token }}
