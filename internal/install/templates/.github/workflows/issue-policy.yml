# Managed by Baton. Edit in this repository when your policy changes.
name: Issue Policy

on:
  issues:
    types:
      - opened
      - edited
  issue_comment:
    types:
      - edited
      - deleted

permissions:
  contents: read
  issues: write

jobs:
  apply-policy:
    name: Apply issue policy
    if: ${{ github.event_name == 'issues' || (!github.event.issue.pull_request && github.event.comment.user.login == 'github-actions[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Baton
        run: |
          __BATON_INSTALL_COMMAND__

      - name: Apply issue policy labels
        run: baton issue-policy --event "$GITHUB_EVENT_PATH" --apply
        env:
          GITHUB_TOKEN: ${{ github.token }}
