# Managed by Baton. Edit in this repository when your policy changes.
name: Issue Policy

on:
  issues:
    types:
      - opened
      - edited

permissions:
  contents: read
  issues: write

jobs:
  apply-policy:
    name: Apply issue policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install Baton
        run: |
          __BATON_INSTALL_COMMAND__

      - name: Apply issue policy labels
        run: baton issue-policy --event "$GITHUB_EVENT_PATH" --apply
        env:
          GITHUB_TOKEN: ${{ github.token }}
