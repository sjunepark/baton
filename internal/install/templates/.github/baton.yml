version: 1

repository:
  default_remote: origin
  base_branch: main
  staging_branch: agent
  work_branch_prefix: agent-work/

issue_policy:
  policy_comment_marker: '<!-- baton-issue-policy:v1 -->'
  form_sections:
    work_kind: Work kind
    agent_mode: Agent mode
    summary: Summary
    context_evidence: Context / evidence
    acceptance_criteria: Acceptance criteria
    non_goals: Non-goals / constraints
    validation_hints: Validation hints
    notes: Notes
  work_kind_labels:
    Bug: bug
    Documentation: documentation
    Enhancement: enhancement
    Question: question
  agent_mode_labels:
    Ready trivial: agent:ready-trivial
    Ready bounded: agent:ready-bounded
    Investigate only: agent:investigate-only
    Needs discussion: needs:discussion
  controlled_label_groups:
    work_kind:
      - bug
      - documentation
      - enhancement
      - question
    agent_mode:
      - agent:ready-trivial
      - agent:ready-bounded
      - agent:investigate-only
      - needs:discussion
    quality_gate:
      - agent:blocked
  implementation_labels:
    - agent:ready-trivial
    - agent:ready-bounded
  comment_only_labels:
    - agent:investigate-only
  skip_labels:
    - agent:blocked
    - needs:discussion
    - needs:review
  required_sections:
    ready-trivial:
      - summary
      - context_evidence
      - acceptance_criteria
    ready-bounded:
      - summary
      - context_evidence
      - acceptance_criteria

pr_policy:
  required_reference_keyword: Refs
  forbidden_closing_keywords:
    - Closes
    - Fixes
    - Resolves
  reject_all_trivial_multi_issue_prs: true
  noisy_commit_subjects:
    - address comments
    - address review
    - changes
    - fix
    - fix lint
    - lint
    - misc
    - oops
    - try again
    - update
    - wip
    - work in progress
  fail_when_commit_listing_reaches_cap: true

labels:
  manifest: .github/labels.yml

worktrees:
  backend: native
  root: ~/.baton/worktrees
  max_leases: 8
  stale_after: 8h

automation:
  prefer_pr_followup_before_issue_intake: true
  allow_merge: false
