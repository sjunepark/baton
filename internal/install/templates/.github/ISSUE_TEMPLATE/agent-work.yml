# Managed by Baton. Edit in this repository when your issue workflow changes.
name: Agent-readable work item
description: Structured work item for human maintainers and LLM agents.
title: '[Work]: '
body:
  - type: dropdown
    id: work_kind
    attributes:
      label: Work kind
      description: Pick the closest routing kind. Use Question when the kind is unclear.
      options:
        - Bug
        - Documentation
        - Enhancement
        - Question
    validations:
      required: true
  - type: dropdown
    id: agent_mode
    attributes:
      label: Agent mode
      description: Controls what an agent may do with this issue.
      options:
        - Ready trivial
        - Ready bounded
        - Investigate only
        - Needs discussion
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the requested outcome in one or two short paragraphs.
    validations:
      required: true
  - type: textarea
    id: context_evidence
    attributes:
      label: Context / evidence
      description: Include links, logs, screenshots, files, commands, or exact observations.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Use concrete bullets or checkboxes. Required by policy for ready agent implementation.
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals / constraints
      description: Optional. Name changes, boundaries, rollout concerns, compatibility limits, or risks the agent should preserve.
    validations:
      required: false
  - type: textarea
    id: validation_hints
    attributes:
      label: Validation hints
      description: Optional. Suggest relevant commands or manual checks. Agents still choose and report validation.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional. Add any extra context that does not belong in the required fields.
    validations:
      required: false
