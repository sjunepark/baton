# Managed by Baton. Edit in this repository when your policy changes, then run
# baton sync-labels --dry-run before applying label updates.
labels:
  - name: 'agent:ready-trivial'
    color: '0E8A16'
    description: 'Agent may make a narrow, obvious fix.'
  - name: 'agent:ready-bounded'
    color: '1D76DB'
    description: 'Agent may implement within explicit scope and criteria.'
  - name: 'agent:investigate-only'
    color: '5319E7'
    description: 'Agent may inspect and comment, but not change behavior.'
  - name: 'needs-info'
    color: 'B60205'
    description: 'Issue is missing information required by repository policy.'
  - name: 'priority:p0'
    color: 'B60205'
    description: 'Highest urgency; blocking or time-critical work.'
  - name: 'priority:p1'
    color: 'D93F0B'
    description: 'High-priority work within the current safety tier.'
  - name: 'priority:p2'
    color: 'FBCA04'
    description: 'Normal Baton queue priority.'
  - name: 'priority:p3'
    color: 'C2E0C6'
    description: 'Lower-priority work when higher priority is available.'
  - name: 'needs:discussion'
    color: 'FBCA04'
    description: 'Human decision needed before implementation.'
  - name: 'needs:review'
    color: 'C5DEF5'
    description: 'Agent work is ready for human review.'
  - name: bug
    color: 'D73A4A'
    description: 'Confirmed defect.'
  - name: documentation
    color: '0075CA'
    description: 'Documentation change.'
  - name: enhancement
    color: 'A2EEEF'
    description: 'Feature or product improvement.'
  - name: question
    color: 'D876E3'
    description: 'Question or clarification.'
